<!doctype html>
<meta charset="utf-8">
<link rel="stylesheet" href="../cards.css">
<link rel="stylesheet" href="../scene.css">
<style>
  .binder { display:flex; gap:6px; }
  .binder .stack { position:relative; flex:1; }
  .binder .bpage { position:absolute; inset:0; }
  #preview { position:absolute; left:70px; right:70px; top:170px; height:560px;
    border-radius:18px; background:#0E0B10; overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,.5); }
  #mini { position:absolute; left:70px; right:70px; top:90px; bottom:110px; }
  #bar { position:absolute; left:40px; right:40px; bottom:40px; height:10px;
    border-radius:5px; background:rgba(255,255,255,.15); overflow:hidden; }
  #fill { width:100%; height:100%; background:#FF9ECF; transform-origin:left; }
  #barlabel { position:absolute; left:40px; bottom:60px; color:#C9B4C0; font-size:13px; }
  #done { position:absolute; left:0; right:0; top:760px; text-align:center; }
  #done .ok { font-size:22px; font-weight:800; color:#8FE3BC; }
  #done .meta { font-size:14px; color:#C9B4C0; margin-top:4px; }
  #share { display:inline-block; margin-top:12px; background:#B23A79; color:#fff;
    font-weight:800; font-size:18px; border-radius:12px; padding:12px 34px; }
</style>
<div class="stage">
  <div class="hook">コレクション自慢、<br>動画で1タップ</div>
  <div id="preview">
    <div id="mini"></div>
    <div id="barlabel">コレクション動画を書き出し中…</div>
    <div id="bar"><div id="fill"></div></div>
  </div>
  <div id="done">
    <div class="ok">✓ 完成</div>
    <div class="meta">1080×1920・15秒・そのまま投稿OK</div>
    <div id="share">TikTokへ共有</div>
  </div>
  <div class="cta"><div class="name">オシカダナ</div>
    <div class="sub">近日公開 — リリース通知はプロフのリンクから</div></div>
  <div class="wm">オシカダナ.app</div>
</div>
<script src="../binder.js"></script>
<script>
  const binder = mountBinder(document.getElementById('mini'), [
    ['c1','holo','c3','c6','c5','c2','c4','c7','c1'],
    ['c5','c2','c7','holo','c1','c6','c3','c3','c4'],
  ]);
  binder.flip(0, { at: 4500, dur: 1200 });

  window.STORYBOARD = [
    { sel: '.hook',    at: 0,    dur: 500,  from: { opacity: 0, transform: 'translateY(20px)' },
                                             to:   { opacity: 1, transform: 'translateY(0)' } },
    { sel: '.hook',    at: 2100, dur: 400,  from: { opacity: 1 }, to: { opacity: 0 }, fill: 'forwards' },
    { sel: '#preview', at: 2500, dur: 600,  from: { opacity: 0, transform: 'scale(.9)' },
                                             to:   { opacity: 1, transform: 'scale(1)' } },
    { sel: '#mini',    at: 3000, dur: 5000, from: { transform: 'rotate(-4deg) scale(.96)' },
                                             to:   { transform: 'rotate(4deg) scale(1)' } },
    { sel: '#fill',    at: 3000, dur: 5000, from: { transform: 'scaleX(0)' },
                                             to:   { transform: 'scaleX(1)' }, easing: 'linear' },
    { sel: '#preview', at: 8000, dur: 500,  from: { transform: 'scale(1)' },
                                             to:   { transform: 'scale(.94) translateY(-40px)' }, fill: 'forwards' },
    { sel: '#done',    at: 8300, dur: 500,  from: { opacity: 0, transform: 'translateY(30px)' },
                                             to:   { opacity: 1, transform: 'translateY(0)' } },
    { sel: '#share',   at: 9200, dur: 350,  from: { transform: 'scale(0)' }, to: { transform: 'scale(1)' },
      easing: 'cubic-bezier(.34,1.56,.64,1)' },
    { sel: '.cta',     at: 11000, dur: 600, from: { opacity: 0 }, to: { opacity: 1 } },
    { sel: '.wm',      at: 0,     dur: 300, from: { opacity: 0 }, to: { opacity: .8 } },
  ];
  window.SCENE_DURATION = 15000;
</script>
<script src="../scene.js"></script>
<script src="../timeline.js"></script>
