<!doctype html>
<meta charset="utf-8">
<link rel="stylesheet" href="../cards.css">
<link rel="stylesheet" href="../scene.css">
<style>
  .binder { display:flex; gap:6px; }
  .binder .stack { position:relative; flex:1; }
  .binder .bpage { position:absolute; inset:0; }
  #shelf { position:absolute; left:60px; right:60px; top:230px; padding:24px;
    display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  #shelf .new { aspect-ratio:3/4; border:2px dashed #D9C6CF; border-radius:10px;
    display:flex; align-items:center; justify-content:center; color:#B197A3; font-size:28px; }
  #pagewrap { position:absolute; left:30px; right:30px; top:140px; height:660px;
    background:#F3EAEE; border-radius:16px; padding:18px; }
  #binder { position:absolute; inset:18px; }
</style>
<div class="stage">
  <div class="hook">トレカ、まだ重いバインダーで<br>管理してるの？</div>
  <div id="shelf" class="panel">
    <div class="bcov g1" id="pop"><span class="t">ハルト💙</span></div>
    <div class="bcov g2"><span class="t">Aqua Prism</span></div>
    <div class="bcov g3"><span class="t">2026 現場</span></div>
    <div class="new">＋</div>
  </div>
  <div id="pagewrap"><div id="binder"></div></div>
  <div class="cta"><div class="name">オシカダナ</div>
    <div class="sub">近日公開 — リリース通知はプロフのリンクから</div></div>
  <div class="wm">オシカダナ.app</div>
</div>
<script src="../binder.js"></script>
<script>
  const binder = mountBinder(document.getElementById('binder'), [
    ['c1','holo','c3','c6','c5','c2','c4','c7','empty'],
    ['c5','c2','c7','holo','c1','c6','empty','c3','c4'],
    ['c3','c6','c1','c2','holo','c7','c5','empty','c4'],
  ]);
  binder.flip(0, { at: 6500, dur: 1000 });
  binder.flip(1, { at: 8500, dur: 1000 });

  window.STORYBOARD = [
    { sel: '.hook',     at: 0,     dur: 500,  from: { opacity: 0, transform: 'translateY(20px)' },
                                               to:   { opacity: 1, transform: 'translateY(0)' } },
    { sel: '.hook',     at: 2100,  dur: 400,  from: { opacity: 1 }, to: { opacity: 0 } },
    { sel: '#shelf',    at: 2500,  dur: 700,  from: { opacity: 0, transform: 'translateY(600px)' },
                                               to:   { opacity: 1, transform: 'translateY(0)' } },
    { sel: '#pop',      at: 3800,  dur: 600,  from: { transform: 'scale(1)' },
                                               to:   { transform: 'scale(1.12)' } },
    { sel: '#shelf',    at: 4600,  dur: 400,  from: { opacity: 1 }, to: { opacity: 0 } },
    { sel: '#pagewrap', at: 4800,  dur: 600,  from: { opacity: 0, transform: 'scale(.92)' },
                                               to:   { opacity: 1, transform: 'scale(1)' } },
    { sel: '.cta',      at: 11000, dur: 600,  from: { opacity: 0 }, to: { opacity: 1 } },
    { sel: '.wm',       at: 0,     dur: 300,  from: { opacity: 0 }, to: { opacity: .8 } },
  ];
  window.SCENE_DURATION = 15000;
</script>
<script src="../scene.js"></script>
<script src="../timeline.js"></script>
