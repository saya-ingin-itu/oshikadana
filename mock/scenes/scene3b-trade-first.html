<!doctype html>
<meta charset="utf-8">
<link rel="stylesheet" href="../cards.css">
<link rel="stylesheet" href="../scene.css">
<style>
  #pick { position:absolute; left:50px; right:50px; top:250px; padding:16px;
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  #pick .pkt { position:relative; }
  #pick .chk { position:absolute; top:4px; right:4px; z-index:2; width:26px; height:26px;
    border-radius:50%; background:#B23A79; color:#fff; font-size:15px; font-weight:800;
    display:flex; align-items:center; justify-content:center; }
  #pick .chk.blue { background:#5356C2; }
  #compose, #teaser { position:absolute; left:60px; right:60px; top:180px; padding:18px; }
  #compose .hd, #teaser .hd { text-align:center; font-weight:800; font-size:20px; letter-spacing:.1em;
    color:#B23A79; margin-bottom:12px; }
  #compose .cols, #teaser .cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  #compose h4, #teaser h4 { margin:0 0 8px; font-size:14px; text-align:center; background:#F3EAEE;
    border-radius:6px; padding:3px 0; color:#6E5F68; }
  #compose .tgrid, #teaser .tgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  #xlabel { position:absolute; left:0; right:0; top:770px; text-align:center;
    font-size:22px; font-weight:800; color:#FF9ECF; }
  .hook3b { align-items:flex-end; padding-bottom:200px; font-size:30px; }
</style>
<div class="stage">
  <div class="hook hook3b">この譲求画像、<br>アプリが3秒で作った</div>
  <div id="pick" class="panel">
    <div class="pkt"><div class="card c1"><div class="deco"></div></div><div class="chk k1">✓</div></div>
    <div class="pkt"><div class="card c5"><div class="deco"></div></div><div class="chk k2">✓</div></div>
    <div class="pkt"><div class="card c7"><div class="deco"></div></div><div class="chk k3">✓</div></div>
    <div class="pkt"><div class="card c6"><div class="deco"></div></div><div class="chk k4">✓</div></div>
    <div class="pkt"><div class="card holo"><div class="deco"></div></div><div class="chk blue k5">✓</div></div>
    <div class="pkt"><div class="card c4"><div class="deco"></div></div><div class="chk blue k6">✓</div></div>
    <div class="pkt"><div class="card c2"><div class="deco"></div></div></div>
    <div class="pkt"><div class="card c3"><div class="deco"></div></div></div>
  </div>
  <div id="compose" class="panel">
    <div class="hd">【交換】トレカ</div>
    <div class="cols">
      <div><h4>譲</h4><div class="tgrid">
        <div class="pkt"><div class="card c1"></div></div><div class="pkt"><div class="card c5"></div></div>
        <div class="pkt"><div class="card c7"></div></div><div class="pkt"><div class="card c6"></div></div>
      </div></div>
      <div><h4>求</h4><div class="tgrid">
        <div class="pkt"><div class="card holo"></div></div><div class="pkt"><div class="card c4"></div></div>
      </div></div>
    </div>
  </div>
  <div id="xlabel">Xにそのまま投稿できる</div>
  <div id="teaser" class="panel">
    <div class="hd">【交換】トレカ</div>
    <div class="cols">
      <div><h4>譲</h4><div class="tgrid">
        <div class="pkt"><div class="card c1"></div></div><div class="pkt"><div class="card c5"></div></div>
        <div class="pkt"><div class="card c7"></div></div><div class="pkt"><div class="card c6"></div></div>
      </div></div>
      <div><h4>求</h4><div class="tgrid">
        <div class="pkt"><div class="card holo"></div></div><div class="pkt"><div class="card c4"></div></div>
      </div></div>
    </div>
  </div>
  <div class="cta"><div class="name">オシカダナ</div>
    <div class="sub">近日公開 — リリース通知はプロフのリンクから</div></div>
  <div class="wm">オシカダナ.app</div>
</div>
<script>
  const pop = (sel, at) => ({ sel, at, dur: 250,
    from: { opacity: 0, transform: 'scale(0)' }, to: { opacity: 1, transform: 'scale(1)' },
    easing: 'cubic-bezier(.34,1.56,.64,1)' });
  window.STORYBOARD = [
    { sel: '.hook',    at: 200,  dur: 400, from: { opacity: 0, transform: 'translateY(20px)' },
                                            to:   { opacity: 1, transform: 'translateY(0)' } },
    { sel: '.hook',    at: 2100, dur: 400, from: { opacity: 1 }, to: { opacity: 0 }, fill: 'forwards' },
    { sel: '#teaser',  at: 2100, dur: 500, from: { opacity: 1 }, to: { opacity: 0 }, fill: 'forwards' },
    { sel: '#pick',    at: 2500, dur: 600, from: { opacity: 0, transform: 'translateY(500px)' },
                                            to:   { opacity: 1, transform: 'translateY(0)' } },
    pop('.k1', 3300), pop('.k2', 3650), pop('.k3', 4000), pop('.k4', 4350),
    pop('.k5', 4900), pop('.k6', 5250),
    { sel: '#pick',    at: 5800, dur: 400, from: { opacity: 1 }, to: { opacity: 0 }, fill: 'forwards' },
    { sel: '#compose', at: 6200, dur: 700, from: { opacity: 0, transform: 'scale(.85)' },
                                            to:   { opacity: 1, transform: 'scale(1)' } },
    { sel: '#compose .hd',   at: 6900, dur: 400, from: { opacity: 0 }, to: { opacity: 1 } },
    { sel: '#compose .cols', at: 7300, dur: 700, from: { opacity: 0, transform: 'translateY(30px)' },
                                                  to:   { opacity: 1, transform: 'translateY(0)' } },
    { sel: '#compose', at: 10000, dur: 500, from: { transform: 'scale(1)' },
                                             to:   { transform: 'scale(.92) translateY(-30px)' }, fill: 'forwards' },
    { sel: '#xlabel',  at: 10400, dur: 400, from: { opacity: 0 }, to: { opacity: 1 } },
    { sel: '.cta',     at: 12000, dur: 600, from: { opacity: 0 }, to: { opacity: 1 } },
    { sel: '.wm',      at: 0,     dur: 300, from: { opacity: 0 }, to: { opacity: .8 } },
  ];
  window.SCENE_DURATION = 15000;
</script>
<script src="../scene.js"></script>
<script src="../timeline.js"></script>
