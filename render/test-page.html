<!doctype html>
<meta charset="utf-8">
<style>
  html,body{margin:0}
  #stage{width:540px;height:960px;background:#fff}
  #box{width:200px;height:200px;background:red;margin:100px}
</style>
<div id="stage"><div id="box"></div></div>
<script>
  const anim = document.getElementById('box').animate(
    [{ background: 'red' }, { background: 'blue' }],
    { duration: 1000, fill: 'both' });
  anim.pause();
  window.__ready = Promise.resolve();
  window.__duration = () => 1000;
  window.__seek = async (ms) => {
    anim.currentTime = ms;
    await new Promise(requestAnimationFrame);
  };
</script>
